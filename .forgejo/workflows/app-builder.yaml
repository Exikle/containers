---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: App Builder

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      release:
        type: boolean
        required: true

jobs:
  build:
    name: Build ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CI_TOKEN }}

      - name: Get app options
        uses: ./.forgejo/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Generate metadata
        id: meta
        env:
          APP: ${{ inputs.app }}
          VERSION: ${{ steps.app-options.outputs.version }}
          RELEASE: ${{ inputs.release }}
        run: |-
          REGISTRY="git.dcunha.io/exikle"
          if [ "$RELEASE" = "true" ]; then
            BAKE=$(jq -nc \
              --arg rolling "${REGISTRY}/${APP}:rolling" \
              --arg version "${REGISTRY}/${APP}:${VERSION}" \
              '{"target":{"docker-metadata-action":{"tags":[$rolling,$version]}}}')
          else
            BAKE=$(jq -nc \
              --arg sandbox "${REGISTRY}/${APP}:sandbox" \
              '{"target":{"docker-metadata-action":{"tags":[$sandbox]}}}')
          fi
          echo "$BAKE" > .docker-metadata.json
          echo "bake-file=.docker-metadata.json" >> $FORGEJO_OUTPUT

      - name: Login to Forgejo Registry
        uses: https://github.com/docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: git.dcunha.io
          username: ${{ forgejo.actor }}
          password: ${{ secrets.CI_TOKEN }}

      - name: Setup Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Add include to build context
        run: rsync -a --ignore-existing --progress ./include/ ./apps/${{ inputs.app }}/

      - name: Build and push
        uses: https://github.com/docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          files: |
            ./apps/${{ inputs.app }}/docker-bake.hcl
            .docker-metadata.json
          set: |
            *.cache-from=type=registry,ref=git.dcunha.io/exikle/build_cache:${{ inputs.app }}-amd64
            *.cache-to=${{ inputs.release && format('type=registry,ref=git.dcunha.io/exikle/build_cache:{0}-amd64,mode=max,compression=zstd,force-compression=true', inputs.app) || '' }}
          push: true
          targets: image-all

      - name: Set up Go
        if: ${{ !inputs.release }}
        uses: https://github.com/actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        if: ${{ !inputs.release }}
        env:
          APP: ${{ inputs.app }}
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TEST_IMAGE: git.dcunha.io/exikle/${{ inputs.app }}:sandbox
        run: go test -v ./apps/${APP}/...
