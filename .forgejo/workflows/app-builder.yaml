---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: App Builder

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      release:
        type: boolean
        required: true

jobs:
  build:
    name: Build ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.CI_TOKEN }}

      - name: Get app options
        uses: ./.forgejo/actions/app-options
        id: app-options
        with:
          app: ${{ inputs.app }}

      - name: Generate metadata
        uses: https://github.com/docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: git.dcunha.io/exikle/${{ inputs.app }}
          tags: |
            type=raw,value=rolling,enable=${{ inputs.release }}
            type=raw,value=${{ steps.app-options.outputs.version }},enable=${{ inputs.release }}
            type=raw,value=sandbox,enable=${{ !inputs.release }}

      - name: Login to Forgejo Registry
        uses: https://github.com/docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: git.dcunha.io
          username: ${{ forgejo.actor }}
          password: ${{ secrets.CI_TOKEN }}

      - name: Setup Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Add include to build context
        run: rsync -a --ignore-existing --progress ./include/ ./apps/${{ inputs.app }}/

      - name: Build and push
        uses: https://github.com/docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: |
            ./apps/${{ inputs.app }}/docker-bake.hcl
            ${{ steps.meta.outputs.bake-file }}
          set: |
            *.cache-from=type=registry,ref=git.dcunha.io/exikle/build_cache:${{ inputs.app }}-amd64
            *.cache-to=${{ inputs.release && format('type=registry,ref=git.dcunha.io/exikle/build_cache:{0}-amd64,mode=max,compression=zstd,force-compression=true', inputs.app) || '' }}
          push: true
          targets: image-all

      - name: Set up Go
        if: ${{ !inputs.release }}
        uses: https://github.com/actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        if: ${{ !inputs.release }}
        env:
          APP: ${{ inputs.app }}
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TEST_IMAGE: git.dcunha.io/exikle/${{ inputs.app }}:sandbox
        run: go test -v ./apps/${APP}/...
