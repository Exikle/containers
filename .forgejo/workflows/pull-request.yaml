---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Validate Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        id: changed-files
        with:
          path: apps
          include_only_directories: true
          max_depth: 1

  build:
    if: ${{ needs.prepare.outputs.changed-files != '[]' && needs.prepare.outputs.changed-files != '' }}
    name: Build and test ${{ matrix.app }}
    needs:
      - prepare
    strategy:
      matrix:
        app: ${{ fromJSON(needs.prepare.outputs.changed-files) }}
      fail-fast: false
      max-parallel: 2
    uses: ./.forgejo/workflows/app-builder.yaml
    secrets: inherit
    with:
      app: ${{ matrix.app }}
      release: false

  build-success:
    if: ${{ !cancelled() }}
    name: Build and test - Success
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "All jobs passed or skipped"

      - name: Post commit status
        if: ${{ always() }}
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          SHA: ${{ forgejo.event.pull_request.head.sha || forgejo.sha }}
          STATE: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
        run: |-
          curl -s -X POST \
            -H "Authorization: token ${CI_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/statuses/${SHA}" \
            -d "{\"context\": \"Build and test - Success\", \"state\": \"${STATE}\", \"description\": \"Container build and test\"}"
