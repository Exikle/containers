---
name: Build and Push Container Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
  pull_request:
    paths:
      - "apps/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changed:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed images
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Build all images on manual trigger
            IMAGES=$(find apps -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | jq -R . | jq -sc .)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} ${{ github.sha }} | grep '^apps/' | cut -d/ -f2 | sort -u | jq -R . | jq -sc .)
            IMAGES=$CHANGED
          fi
          echo "matrix=${IMAGES}" >> "$GITHUB_OUTPUT"
          echo "Images to build: ${IMAGES}"

  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: changed
    if: needs.changed.outputs.matrix != '[]' && needs.changed.outputs.matrix != ''
    strategy:
      matrix:
        image: ${{ fromJson(needs.changed.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
